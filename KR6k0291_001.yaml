body:
  text: 釋弘一徵辨學律義八則問我等受戒未能如法將何以自解耶若云受戒未能如法決定不得戒者有何明文作證耶答今先解釋不得戒義一結界成就作法界二有能秉法僧真實比丘得比丘戒緣依羯磨録三僧數滿足十人五人戒淨解明四界內盡集和合非別衆五有羯磨教法如法誦作六資緣具足三衣及鉢以上六緣若闕一者即不得戒今則悉闕故不得戒義可以決定無疑沙彌戒於師授前應在僧中作單白羯磨故前五緣皆同亦應判為不得問既知未能得比丘戒應有何妥善之辦法耶答今據拙見擬定辦法分為二事一勸令禮占察懺儀求得比丘戒藕益大師云末世欲得淨戒捨此占察輪相之法更無別途大師即依此法而得比丘戒也此事易知今不詳述二於未得戒以前為護法心維持現狀不令斷絶令已受而未得者學習比丘律此事頗有疑問後之辨釋皆約此也以上所言二事第一為根本之辦法第二為維持現狀之辦法此二事應同時並行不可或闕若唯有第二而無第一則永遠無真實比丘出現若唯有第一而無第二則過渡時代之現狀不能維持故須二事同時並行乃為宜也問非比丘學比丘律可有聖教作證耶將答此問先須解釋非比丘三字一約沙彌此非問者本意所在二約已受沙彌比丘戒而不如法不得戒者問者本意在此非比丘有三類以下答文皆約比辨釋文中亦有時指前後二類者為是兼明非正意也三約未曾受沙彌比丘戒者答若欲覓求律中有制未得戒者必須學比丘律之明文乃不可能之事但可引文以證非比丘而學比丘律無有賊住之過失又可引文以證已受比丘戒而不如法不得戒之白衣雖在僧中聞正式作羯磨者亦不成賊住依此義判已受而不如法不得戒之白衣或亦可以學比丘律即在僧中聞正式作羯磨者亦似無大礙也問前云非比丘而學比丘律無賊住過有何文以為證耶答靈芝律師資持記云問私習秉唱未具忽聞及未受前曾披經律因讀羯磨了知言義成障戒否即賊住答準前後文並論僧中正作詐竊成障安有讀文而成障戒古來高僧多有在俗先披大藏今時信士多亦如之若皆障戒無乃太急學者詳之以上原文又羯磨云二者有人不得滿數應訶謂若欲受大戒人靈芝律師濟緣記釋云謂沙彌受戒或曾披律或復重來曉達如非旁無訶者所為不輕聽自訶止以上原文曾披律者既可求受大戒足證無有賊住過矣問前云已受比丘戒而不如法不得戒之白衣雖在僧中聞正式作羯磨者亦不成賊住此言尤足令人駭異有何明文以為證耶答羯磨云三者不得滿數不得訶者白衣南山律祖疏云前十三難有過障戒此好白衣受十具戒雖並心淨不妨加法參差不成仍本名故以上原文今案我等已受戒而不如法不得戒者即屬此類雖於僧中聞作羯磨亦僅判為不得滿數不得訶決不云成賊住難以無詐竊心故而云此好白衣也問已受而不得戒之白衣若聞僧中正式作羯磨而無賊住難者何以説戒羯磨時遣沙彌出耶答靈芝律師資持記云説戒遣未具者恐生輕易不論障戒且如大尼亦遣豈慮障戒耶以上原文問既不得沙彌比丘戒不堪為人世福田虛消信施罪果難逃耶答南山律祖行事鈔云善見檀越請比丘沙彌雖未受具亦入比丘數𣵀槃乃至未受十戒亦得受請靈芝律師資持記釋云論約法同沙彌經聽形同出家優婆塞無非皆為解脫出家即堪受供以上原文故知不為解脫出家雖是比丘亦應云虛消信施若為解脫出家雖優婆塞亦堪為人世福田問當來真實比丘出現如法傳戒即皆成為真實比丘不須復云維持現狀當其時若有未受比丘戒者仍可引據前例而先學比丘律耶答前文曾云為護法心維持現狀不令斷絶令已受而未得者學習比丘律因引諸文曲為證明余蓋欲於過渡時代勉強維持冀延一線之傳也若當來皆成真實比丘不須復云維持現狀即應依通途軌則慎重其事凡有未受比丘戒者不須令其輒學律也豈唯當來即以現在而論若未經受戒者亦不須學唯有已受戒而不如法不得戒者乃可令其學律若如是者庶幾無大過乎問答十章問近世諸叢林傳戒之時皆令熟讀毗尼日用切要俗稱為五十三咒未審可否答藕益大師曾有文解釋此義今略録之文云既預比丘之列當以律學為先今之願偈即當願衆生等本出華嚴種種真言皆屬密部論法門雖不可思議約修證則各有本宗收之則全是若一偈若一句若一字皆為道種揀之則全非律不律顯不顯密不密僅成散善此正法所以漸衰而未運所以不振有志之士不若專精戒律辦比丘之本職也以上大師之説十誦諸比丘廢學毗尼便讀誦修多羅阿毗曇世尊種種訶責乃至由有毗尼佛法住世等多有上座長老比丘學律問百丈清規頗與戒律相似今學律者亦宜參閲否答百丈於唐時編纂此書其後屢經他人增刪至元朝改變尤多本來面目殆不可見故蓮池藕益大師力詆斥之蓮池大師之説今未及檢録唯録藕益大師之説如下文云正法滅壞全由律學不明百丈清規久失原作本意並是元朝流俗僧官住持杜撰增飾文理不通今人有奉行者皆因未諳律學故也又云非佛所制便名非法如元朝附會百丈清規等又云百丈清規元朝世諦住持穿鑿尤為可恥以上皆大師之説案律宗諸書浩如煙海吾人盡形學之尚苦力有未及即百丈原本今仍存在亦可不須閲覽況偽本乎今宜以蓮池藕益諸大師之言傳示道侶可也問今世俗衆乞師證明受歸依者輒稱歸依某師未知是否答不然以所歸依者為僧伽非唯歸依某師一人故藕益大師云歸依僧者則一切僧皆我師也今世俗士擇一名德比丘禮事之竊竊然矜曰吾為某知識某法師門人也彼知識法師者亦竊竊然矜曰彼某居士某宰官歸依於我者也噫果若此則應曰歸依佛歸依法結交一大德可也可云歸依僧也與哉問近世弘律者皆宗蓮池大師沙彌律儀要略未知善否答沙彌戒法注釋之書以藕益大師所著沙彌十戒威儀録要最為完善此書揚州刻板共為一册標名曰沙彌十法并威儀價金僅洋一角餘若與初學之人講解沙彌律者宜用此書也蓮池大師為淨宗大德律學非其所長所著律儀要略中多以己意判斷不宗律藏故藕益大師云蓮池大師專弘淨土而於律學稍疏見梵網合注緣起中今未檢原書略述其大意如此又云律儀要略頗有斟酌堪逗時機而開遮輕重懺悔之法尚未申明以此諸文證之是書雖可導俗似猶未盡善也問沙彌戒第十不捉持金銀今人應依何方法乃能不犯此戒答根本有部律攝云比丘若得金銀等物應覓俗衆為淨施主即作施主物想捉持無犯雖與施主相去甚遠若以後再得金銀等應遙作施主物心而持之乃至施主命存以來並皆無犯若無施主可得者應持金銀等物對一比丘作如是説大德存念我比丘某甲得此不淨財當持此不淨財換取淨財三説已應自持舉或令人持舉皆無犯也以上録律攝大意非全文也問今世傳戒皆聚集數百人并以一月為期是佛制否答佛世凡受戒者由剃髮和尚為請九僧即可授之是一人別受也此土唐代雖有多人共受者亦止一二十人耳至於近代唯欲熱鬧門庭遂乃聚集多衆故藕益大師嘗斥之云隨時皆可入道何須臘八及四月八難緣方許三人豈容多衆至百千衆也至於受戒之時不足半日即可授了何須多日且近代一月聚集多衆者亦祇令受戒者助作水陸經懺及其他佛事等終日忙迫罕有餘暇受戒之事了無關係斯更不忍言矣故受戒決不須多日所最要者和尚於受前受後應負教導之責耳唐義淨三藏云豈有欲受之時非常勞倦亦既得已戒不關懷不誦戒經不披律典虛霑法伍自損損他若此之流成滅法者藕益大師云夫比丘戒者乃是出世宏規僧寶由斯建立貴在受後修學行持非可僅以登壇塞責而已是故誘誨獎勸宜在事先研究討明功須五夏而後代師匠多事美觀遂以平時開導之法混入登壇秉授之次又受時雖似殷重受後便謂畢功顛倒差訛莫此為甚菩薩戒另受問今世傳戒有戒元戒魁等名未知何解答此於受戒之前令受戒者出資獲得與清季時捐納功名無異非因戒德優劣而分也此為陋習最宜革除問末世授戒未能如法決不得戒未識更依何方便而能獲得比丘戒耶答藕益大師云末世欲得淨戒捨此占察輪相之法更無別途蓋指依地藏菩薩占察善惡業報經所立之占察懺法而言也案占察經云先示懺法大略未來世諸衆生等欲求出家及已出家若不能得善好戒師及清淨僧衆其心疑惑不得如法受於禁戒者但能學發無上道心亦令身口意得清淨已禮懺七日之後每晨以身口意三輪三擲皆純善者即名得清淨相其未出家者應當剃髮被服法衣仰告十方諸佛菩薩請為師證一心立願稱辨戒相先説菩薩十根本重戒次當總舉菩薩律儀三種戒聚所謂攝律儀戒五八十具等攝善法戒攝化衆生戒自誓受之則名具獲波羅提木叉出家之戒名為比丘比丘尼以上經文故藕益大師於三十五歲退為沙彌遂專心禮占察懺法至四十七歲正月初一日乃獲清淨輪相得比丘戒約有戒論退為出家優婆塞成時性旦并受長期八戒已前約無戒論自誓受三歸五戒長期八戒菩薩戒少分授比丘戒緣第四心境相應或心不當境或境不稱心或心境俱不相應並非法故問若已破四重戒者猶得再受比丘戒耶答在家之人或破五戒八戒中四重出家之人或破沙彌沙彌尼式叉摩那比丘比丘尼戒中四重並名邊罪若依小乘律不得重受若依梵網經雖通懺悔須以得見相好為期今依占察經懺法則以得清淨輪相為期也占察經云未來之時若在家若出家諸衆生等欲求受清淨妙戒而先已作增上重罪即是邊罪不得受者亦當如上修懺悔法令其至心得身口意善相已即應可受問古代禪宗大德居山之時則以三條篾一把鋤為清淨自活領衆之時又以一日不作一日不食為清規皆與律制相背是何故耶答古代禪宗大德嚴淨毗尼宏範三界者如遠公智者等是也其次則捨微細戒唯護四重但決不敢自稱比丘不敢輕視律學唯自愧未能兼修以為慚德耳昔有人問壽昌禪師云佛制比丘不得掘地損傷草木今何自耕自種答云我輩祇是悟得佛心堪傳祖意指示當機令識心性耳若以正法格之僅可稱剃髮居士何敢當比丘之名也又問設令今時有能如法行持比丘事者師將何以視之答云設使果有此人當敬如佛待以師禮我輩非不為也實未能也又紫柏大師生平一粥一飯別無雜食脅不著席四十餘年猶以未能持微細戒故終不敢為人授沙彌戒及比丘戒必不得已則授五戒法耳嗟乎從上諸祖敬視律學如此豈敢輕之若輕律者定屬邪見非真實宗匠也以上依藕益大師文挈録上列十章未依次第又以匆促撰録或有文義未妥之處俟後修正可也占察法木輪相共十九輪一能示宿世所作善惡業種差別但觀善惡種子有無輪相有三種差別二觀善惡業力強弱三遍示三世受報差別一共十輪書十善十惡之名一面書善一面書惡令使相對則餘兩面皆空故使善惡有現有不現也二三初輪念相應否二皆有不再擲或再擲占時用初二次輪唯取前相應者問不符再擲菩薩戒自誓受依瑜伽羯磨先羯磨後戒相比丘及比丘尼戒羯磨同上菩薩一比丘二年未滿似亦應依前羯磨受年滿時仍依前羯磨受行法增加第一先灑淨楞嚴咒繞壇禮懺七日後擲三業最好用九個閉目三擲後再看普勸出家人常應受八戒文八戒正為在家二衆而制但出家五衆亦可受之如藥師經謂苾芻苾芻尼即是比丘比丘尼等有能受持八分齋戒求生極樂世界而未定者若聞藥師名號臨命終時有八菩薩乘神通來示其道路即於彼界種種雜色衆寶華中自然化生以此經文證之可知出家之人亦應受持八戒雖八戒戒相於比丘戒或沙彌戒中已具今為令功德增上故不妨再受八戒也八戒通大小乘小乘者如成實論等大乘者即菩薩八戒如文殊問經及八種長養功德經此經余已書寫佛學書局流通所明吾等既已受菩薩戒今受八戒亦即是大乘八戒也受八戒之時日或每月六齋日受或每日長期受悉可隨意若長期受者或每日晨起受一次限於一日夜或數日數月而總受之例如欲連續受一月者於第一日晨朝發心受時陳明一月則此一月限內皆有效不須再受悉可隨意受八戒時可以在佛像前自誓受受時限於晨朝或因事須延至日午前後乃受者必須於晨朝心念決定今日受八戒如此作意雖延時緩受無妨也受戒之文或依隨機羯磨所載或依八種長養功德經文悉可隨意若依隨機羯磨文而自誓受者應略刪改如淨行優婆塞應改為淨行菩薩或改為淨行出家優婆塞又如説戒相文中每條有能持不答言五字皆刪去因自誓受故又離高勝牀上坐今以因緣不具未能十分如法牀足太高於此條戒相説畢下文能持二字不説可改為離高勝牀上坐今僅能隨分受持作倡伎樂故往觀聽能持又受畢發願之文可以改為願我臨欲命終時四偈及我此普賢殊勝行一偈或有人欲用原文者亦善受持八戒之受法詳解併其功德廣如羯磨疏記及行事鈔記等所明自披尋之大藏經會謹案佛學書局影印大師所書受八關齋戒法茲照録如下受八關齋戒法依佛説八種長養功德經録出歸命一切佛惟願一切佛菩薩衆攝受於我我今歸命勝菩提最上清淨佛法衆我發廣大菩提心自他利益皆成就懺除一切不善業隨喜無邊功德蘊先當不食一日中案即一日夜中過午不食後修八種功德法已上三説我名某甲惟願阿闍梨攝受於我我從今時發淨信心乃至坐菩提場成等正覺誓歸依佛二足勝尊誓歸依法離欲勝尊誓歸依僧調伏勝尊如是三寶是所歸趣已上三説我某甲淨信優婆塞案受八戒者正屬在家二衆亦兼通於出家諸衆如藥師經中所明此文且據在家者言故云優婆塞若出家者隨宜稱之惟願阿闍梨憶持護念我從今日今時發起淨心乃至過是夜分訖於明旦日初出時於其中間奉持八戒所謂一不殺生二不偷盜三不非梵行四不妄語五不飲酒六不非時食七不華鬘莊嚴其身及歌舞戲等八不坐臥高廣大牀我今捨離如是等事誓願不捨清淨禁戒八種功德已上三説我持戒行莊嚴其心令心喜悅廣修一切相應勝行求成佛果究竟圓滿一説又誦伽陀頌曰我發無二最上心為諸衆生不請友勝菩提行善所行成佛世間廣利益願我乘是善業故此世不久成正覺説法饒益於世間解脫衆生三有苦歲次壽星沙門善夢敬書時居豐州靈應山中雜録原稿無隨宜編入下準此南山三大部靈芝記注釋現存本佚失不傳者不録資持記資行鈔二十八卷日本照遠撰南普陀寺及湛山寺藏大正大藏經第六十二卷刊本日本唐招提寺藏寫本講要七卷日本良秀述日本大谷大學藏寫本通八卷同通考十卷同序解並五例講義一卷宋則安述續藏經刊本南普陀寺藏通釋二十卷日本古寫本南山律苑藏濟覽二十六卷日本古寫本彼邦今失傳南山律苑藏行宗記警意鈔二十二卷今殘缺日本照遠述日本東大寺藏殘本十六卷日本大谷大學藏殘寫本五卷濟緣記顯緣鈔四十一卷日本照遠述日本東大寺藏刊本續藏經第五十九套第三册梵網義疏智者刪補明曠疏注宋與咸加注續第四册第五册梵網經記唐傳奧第六十套第一册賢首疏義寂疏第二册勝莊述記知周疏殘太賢宗要第三册太賢古迹記法銑疏殘宋慧因注第六十一套第三册元曉菩薩戒本持犯要記第六十二套第一册四分比丘戒本疏唐定賓同含注戒本唐道宣同戒本疏發揮記宋允堪卷三第六十三套第一册釋四分戒本序宋道言第六十四套第一册四分律比丘尼鈔六卷道宣第二册業疏正源記宋允堪第六十五套第一册羯磨序解宋則安第三册四册五册四分律疏唐法礪第六十六套第一册二册三册同上飾宗義記唐定賓第四册五册四分律疏唐智首卷九四分律開宗記唐懷素第六十七套第一册第二册三册四册五册行事鈔批二十八卷唐大覺第六十八套第一册第二册三册四册五册行事鈔簡正記十七卷後唐景霄第九十四套第二册三册四册𣵀槃經集解梁寶亮等第九十五套第二册梵網戒本私記元曉卷上四分律搜玄録殘唐志鴻第三册義鈔輔要記允堪第五册略授三歸五八戒並菩薩戒唐澄照第二編第十一套第一册律苑事規元省悟大正新修大藏經第四十卷律疏部全行事鈔等論疏部一第四十五卷諸宗部二誡觀法等第六十二卷續律疏部全梵網開題同戒本疏日珠鈔資行鈔第七十四卷續諸宗部五律宗綱要等第八十五卷古逸部疑似部行事鈔三大部戒本疏南山律羯磨疏拾毗尼義鈔二小部比丘尼鈔開非時食沙彌十戒儀則經自誓受戒瓔珞梵網占察大毗婆沙論第百二十四地論第四十一俱舍論第十四順正理論第三十七阿毗達磨藏顯宗論第十九大乘法苑義林章第三末越毗尼罪唯泛稱違律之罪不指罪名此語散見僧祇律非無重輕之別如第三以盜心觸七日藥云云近事律儀別解脫律儀之一於諸善法親近承事故曰近事能防身語故名律儀有部必受五戒方名經部等但三歸近住律儀八戒別解脫律儀之一近阿羅漢住故云近住略誦四分戒菩薩戒法釋弘一依南山律主行事鈔盛夏嚴冬應略説戒四分戒本二不定誦畢續云諸大德是三十尼薩耆波逸提法僧常聞諸大德是九十波逸提法僧常聞諸大德是衆學法僧常聞諸大德是七滅諍法僧常聞以下即接第三十九頁第三行下半行此是佛所説戒經云云菩薩戒本十重戒誦畢至八萬威儀品當廣明續云諸大德以下四十八輕戒諸大德常聞以下即接云第四十二頁後半頁諸佛子是四十八輕云云敬三寶癸酉閏五月五日在泉州大開元寺講弘一律師三寶者佛法僧也其義甚廣今惟舉其少分之義耳今言佛者且約佛像而言如木石等所雕塑及紙畫者也今言法者且約經律論等書册而言或印刷或書寫也今言僧者且約當世凡夫僧而言因菩薩羅漢等附入敬佛門也第一敬佛略舉常人所應注意者數條禮佛時宜洗手漱口至誠恭敬緩緩而拜不可急忙寧可少拜不可草率佛几清潔供香端直供佛之物以烹調精美人所能食者為宜今多以食物之原料及罐頭而供佛者殊為不敬藕益大師大悲咒行法中曾痛斥之又供佛宜在午前不宜過午也供水果亦宜午前供水宜捧奉式供花花瓶水宜常換紙畫之佛像不可僅以綾裱恐染蠅糞等穢物也少蠅者或可宜裝入玻璃鏡中木石等雕塑者小者應入玻璃龕中大者應作寶蓋罩之並須常拂拭像上之塵土凡大殿及供佛之室中皆不宜踞坐笑談如對於國王大臣乃至賓客之前尚應恭敬慎護威儀況對佛像耶不可佛前曬衣服宜偏側不得在殿前用夜壺水澆花若臥室中供佛像者眠時應以淨布遮障第二敬法略舉常人所應注意者數條讀經之時必須洗手漱口拭几衣服整齊威儀嚴肅與禮佛時無異藕益大師云展卷如對活佛收卷如在目前千遍萬遍寤寐不忘如是乃能獲讀經之實益也對於經典應十分恭敬護持萬不可令其污損又翻篇時宜以指腹輕輕翻之不可以指爪劃又不應折角若欲記志以紙片夾入可也若經典殘缺者亦不可燒臥室中几上置經典者眠時應以淨布蓋之禮佛多少不拘讚佛經偈或天上天下無如佛等阿彌陀佛身金色等爐香乍爇不是讚佛附每日誦經時儀式供養願此香華雲等讀經回向不拘或用我此普賢殊勝行等第三敬僧略舉常人所應注意者數條凡剃髮披袈裟者皆是釋迦佛子在家人見之應一例生恭敬心不可分別持戒破戒若皈依三寶時禮一出家人為師而作證明者不可妄云皈依某人因所皈依者為僧非皈依某一人應於一切僧衆若賢若愚生平等心至誠恭敬尊之為師自稱弟子則與皈依僧伽之義乃符合矣供養僧者亦爾不可專供有德者應於一切僧生平等心普遍供之乃可獲極大之功德也專贈一人功德小供衆者功德大出家人若有過失在家人聞之萬不可輕言此為佛所痛誡者最宜慎之以上已略言敬三寶義竟茲附有告者廈門泉州神廟甚多在家人敬神每用豬雞等物豈知神皆好善而惡殺今殺豬雞等物而供神神不受享又安能降福而消災耶惟願自今以後痛革此種習慣凡敬神時亦一例改用素食則至善矣行事鈔資持記隨講別録甲戌二月十一日始録上卷衆行古傳中卷自行下卷共行上卷下卷對事造修名作持行行事鈔一部分為上中下三卷初約止作判中卷守戒離過名止持行上卷津刻鈔記會本上卷僧務名衆行第二册至七册上半靈芝義判二約衆別判中卷第七册下半中卷下卷自修名別行至第十五册上半上卷中卷各局故純下卷第十五册下半三約純雜判至第二十册下卷隨機故雜且據大途如上所判至論互相投寄不無相兼上卷標宗顯德篇第一標宗者即文中所列戒法戒體戒行戒相也顯德者廣引聖教贊述戒功也羯磨第十篇後半明教詮相文多與此同集僧通局篇第二集僧謂作相軌度通局謂約界用人此與羯磨第一篇成法十緣中三集僧方法四僧集約界相同足數衆相篇第三與十緣中六簡衆是非大同別衆法附與五應法和合同受欲是非篇第四與十緣中七説欲清淨同通辨羯磨篇第五此篇總明緣法是非成敗望下諸篇隨事各別故云通辨此與羯磨第一篇大同結界方法篇第六與羯磨第二篇中僧界結解法同僧網大綱篇第七受戒緣集篇第八與羯磨第三篇中比丘受戒法同六念法附與第十篇中六念法同師資相攝篇第九與羯磨第三篇中請依止師法及第十篇中訶責弟子法弟子辭和尚白謝法同説戒正儀篇第十與羯磨第五篇同安居策修篇第十一與羯磨第六篇同白恣宗要篇第十二與羯磨第七篇同中卷篇聚名報篇第十三與戒本疏中大同隨戒釋相篇第十四與戒本同持犯方軌篇第十五與戒本疏中大同懺六聚法篇第十六與羯磨第九篇同下卷二衣總別篇第十七與羯磨第四篇中衣法尼師壇法説淨法同又與羯磨第二篇中衣界及第八篇同四藥受淨篇第十八與羯磨第四篇中藥法同又與羯磨第二篇中食界同鉢器制聽篇第十九與羯磨第四篇中鉢法同對施興治篇第二十頭陀行儀篇第二十一僧像致敬篇第二十二訃請設則篇第二十三導俗化方篇第二十四與羯磨第三篇中受三歸五八戒法同主客相待篇第二十五瞻病送終篇第二十六諸雜要行篇第二十七沙彌別法篇第二十八與羯磨第三篇中沙彌法同尼衆別行篇第二十九與羯磨第三篇中尼法同又與羯磨第五篇中尼法及第七篇中尼法同諸部別行篇第三十略釋題目四分律刪繁補闕行事鈔資持記四分律即律題刪繁補闕行事鈔即鈔題資持記即記題上十字為所解本文下三字即能解之記四分律如常釋刪補者示異古也行事者行以運載為義事即對理彰名然事通善惡此唯善事又局戒善也鈔有二義一採摘二包攝也資持者資以助發為義持即對犯彰名也四分成宗多意業結罪一方便罪重罪有三初遠方便起淫意二次方便動身未到前境三近方便到前境未入輕罪有二初遠方便極少見廣律中二近方便合次近為一二果頭罪如默妄等大乘地上皆約意業結正罪如古迹記凡夫且約梵網十重戒中唯八慳九瞋之正罪屬於意業此外八條戒皆身口犯以意業為遠方便若就大乘八戒言皆約身口結正罪意業唯是方便依長養功德經或四分隨機羯磨受八戒者之區別受時教宗不同四分小長養大發心緣境同皆三聚攝如業疏委明靈芝云依小律儀即成大行豈曰棄捨方為大乎隨行時依大乘戒舊疏家判身口罪同如殺人盜五大妄乃犯重等彼此全同意方便罪不同瞥爾重緣異也依大乘戒新疏家判身口罪多不同新疏較舊疏為急今若依長養經受八戒而發心據大乘戒舊疏家所判者行持實與依四分隨機羯磨所受者無大異也八戒可以一月乃至盡形受值難緣則退去後再受之
